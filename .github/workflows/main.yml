name: Saeedthon_24_7

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-saeedthon:
    runs-on: ubuntu-latest
    
    concurrency:
      group: saeedthon-group
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg build-essential

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # جربنا تثبيت neonize بدلاً من neonize-bin
          pip install telethon instagrapi neonize Flask gunicorn heroku3 requests
          if [ -f requirements.txt ]; then 
            # تنظيف ملف requirements من neonize-bin إذا كان موجوداً لتجنب الخطأ
            sed -i '/neonize-bin/d' requirements.txt
            pip install -r requirements.txt
          fi

      - name: Run Saeedthon
        env:
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
          WA_NUMBER: ${{ secrets.WA_NUMBER }}
          WA_SESSION: ${{ secrets.WA_SESSION }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: |
          python Saeedthon.py
        
    timeout-minutes: 350
