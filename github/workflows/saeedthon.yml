name: Saeedthon Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon instagrapi neonize-bin # مكتبات المنصات

      - name: Run Saeedthon
        env:
          # هنا نضع المتغيرات السرية (سنضبطها في الخطوة التالية)
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
        run: python Saeedthon.py

